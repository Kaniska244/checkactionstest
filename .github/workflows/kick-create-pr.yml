name: Kick create-pr as bot

# Manually dispatched by a human. Instead of doing the work itself, it uses the
# built-in GITHUB_TOKEN to send a repository_dispatch event, which triggers the
# "Create PR with GITHUB_TOKEN" workflow. Because that dispatch is made by the
# GITHUB_TOKEN, the resulting create-pr run has triggering_actor =
# github-actions[bot].
#
# NOTE (corrected): this does NOT suppress the downstream pull_request
# workflows. The PR that create-pr opens is attributed to the human repo owner,
# so dummy-on-pr / code-linter still RUN (see PR #6). The part that IS a genuine
# bot-attributed, non-exception event is the BRANCH PUSH performed by that
# create-pr run -> that is what dummy-on-push.yml expects to see SUPPRESSED.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kick:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch via GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d '{"event_type":"create-pr-bot"}'
          echo "repository_dispatch 'create-pr-bot' sent."
