name: Kick create-pr as bot

# Manually dispatched by a human. Instead of doing the work itself, it uses the
# built-in GITHUB_TOKEN to send a repository_dispatch event, which triggers the
# "Create PR with GITHUB_TOKEN" workflow. Because that dispatch is made by the
# GITHUB_TOKEN, the resulting create-pr run has triggering_actor =
# github-actions[bot]. When that bot-owned run opens a PR, the pull_request
# event is a genuine bot -> bot chain and GitHub's loop-prevention SUPPRESSES
# the downstream workflows (dummy-on-pr, code-linter).
#
# Contrast with running "Create PR with GITHUB_TOKEN" directly via
# workflow_dispatch: there the human is the triggering_actor, so the downstream
# workflows DO run (see PR #2).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kick:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch via GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/dispatches" \
            -d '{"event_type":"create-pr-bot"}'
          echo "repository_dispatch 'create-pr-bot' sent."
