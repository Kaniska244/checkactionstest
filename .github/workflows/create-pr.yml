name: Create PR with GITHUB_TOKEN

# Creates a branch, makes a dummy change and opens a PR using the built-in
# GITHUB_TOKEN. Used to explore GitHub Actions' loop-prevention.
#
# VERIFIED MODEL (fits all observed runs): a run is SUPPRESSED iff
#   triggering_actor == github-actions[bot]
#   AND event NOT in {workflow_dispatch, repository_dispatch}.
#
# In practice the pull_request events created here are attributed to the repo
# owner (a human), so downstream pull_request workflows have ALWAYS run,
# regardless of how this workflow was triggered (PR #2/#5/#6). The genuine
# suppression case is exercised by dummy-on-push.yml via the branch push made
# during a repository_dispatch (bot-triggered) run.

on:
  # triggering_actor is a human -> downstream pull_request workflows RUN
  # (this is what PR #2 demonstrated).
  workflow_dispatch:
  # Dispatched by the "Kick create-pr as bot" workflow. This run's
  # triggering_actor IS github-actions[bot], but repository_dispatch is an
  # exception, so the run itself executes. The PR it opens is still attributed
  # to the human repo owner, so downstream pull_request workflows RUN too
  # (this is what PR #6 demonstrated). The bot-attributed BRANCH PUSH from this
  # run is the case that dummy-on-push.yml expects to see SUPPRESSED.
  repository_dispatch:
    types: [create-pr-bot]
  # Scheduled run: fires daily at 06:31 UTC. triggering_actor is the last user
  # to modify the workflow (a human), so downstream workflows RUN. Notes:
  #   * GitHub only runs schedules from the workflow file on the DEFAULT
  #     branch, so this file must be committed to main to take effect.
  #   * The schedule must be registered on main WELL BEFORE the fire time;
  #     a cron only a minute or two ahead will not fire.
  #   * Scheduled starts are commonly delayed several minutes under load, and
  #     round minutes (:00/:15/:30/:45) are the most congested.
  schedule:
    - cron: '31 6 * * *'
  # Push run: fires when commits land on main. Scoped to main and ignores the
  # test artifact so merged auto-PRs don't recursively re-trigger this workflow.
  push:
    branches: [main]
    paths-ignore:
      - 'recursive-test.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create branch and dummy change
        run: |
          set -euxo pipefail
          BRANCH="auto-pr/${GITHUB_RUN_ID}"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          echo "Dummy change from run ${GITHUB_RUN_ID} at $(date -u)" > recursive-test.txt
          git add recursive-test.txt
          git commit -m "chore: dummy change to test recursive events"
          git push --set-upstream origin "${BRANCH}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euxo pipefail
          if [ "${EVENT_NAME}" = "repository_dispatch" ]; then
            EXPECT="This run's triggering_actor is github-actions[bot], but the pull_request event is attributed to the human repo owner, so downstream pull_request workflows still RUN. Watch dummy-on-push instead: the branch push from this bot-triggered run should be SUPPRESSED."
          else
            EXPECT="triggering_actor is a human, so downstream pull_request workflows RUN."
          fi
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Test recursive events via ${EVENT_NAME} (created with GITHUB_TOKEN)" \
            --body "Automated PR opened with the built-in GITHUB_TOKEN from a '${EVENT_NAME}' run. ${EXPECT}"
